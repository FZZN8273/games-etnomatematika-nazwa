<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Etnomatematika Nusantara · Pembuka</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Sen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a0f08;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Sen', sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 900px;
            height: 600px;
            position: relative;
            background-color: #1a3a5c;
            border: 10px solid #4a2e1b;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            transform-origin: center center;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }

        .slide.active {
            display: block;
        }

        .bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: rgba(0, 20, 50, 0.25);
            pointer-events: none;
        }

        /* ===== KONTEN ===== */
        .slide-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 60px;
        }

        .slide-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 2px 10px rgba(0, 0, 0, 0.5);
            font-size: clamp(32px, 6vw, 56px);
            text-align: center;
            line-height: 1.15;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .slide-title .highlight {
            color: #f5c842;
        }

        .slide-sub {
            font-family: 'Sen', sans-serif;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
            font-size: clamp(16px, 2.5vw, 24px);
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-nav {
            padding: 14px 40px;
            border-radius: 50px;
            border: 4px solid #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: clamp(16px, 2vw, 22px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #f5c842, #dca658);
            color: #1a1a2e;
            letter-spacing: 1px;
        }

        .btn-nav:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-nav:hover {
            transform: scale(1.03);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
            .slide-content {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .slide-title {
                font-size: clamp(24px, 8vw, 36px);
            }
            .btn-nav {
                padding: 10px 24px;
                font-size: 14px;
            }
        }

        /* ===== LOADING ===== */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 230, 208, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Poppins', sans-serif;
            border: 6px solid #dca658;
        }
        #loading-screen .spinner {
            width: 80px;
            height: 80px;
            border: 10px solid #dca658;
            border-top: 10px solid #6b442a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            position: relative;
        }
        #loading-screen .spinner::after {
            content: "✦";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #6b442a;
        }
        #loading-screen h2 {
            font-size: 28px;
            font-weight: 900;
            color: #4a2e1b;
            margin-bottom: 5px;
        }
        #loading-screen p {
            font-size: 16px;
            color: #6b442a;
            font-weight: 700;
            font-style: italic;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">

            <!-- ===== LOADING ===== -->
            <div id="loading-screen">
                <div class="spinner"></div>
                <h2>Nenek Moyang Lagi Natah...</h2>
                <p>Jangan kemana-mana, bentar lagi wayangnya main!</p>
            </div>

            <!-- ===== AUDIO ===== -->
            <audio id="a-click" src="click.mp3" preload="auto"></audio>

            <!-- =========================================================
            SLIDE 1: wel1.jpg (Background Biru)
            ========================================================= -->
            <div id="slide1" class="slide active">
                <img src="wel1.jpg" class="bg-img" alt="Etnomatematika Nusantara">
                <div class="overlay"></div>
                <div class="slide-content">
                    <div class="slide-title">
                        SELAMAT DATANG DI<br>
                        <span class="highlight">ETNOMATEMATIKA NUSANTARA</span>
                    </div>
                    <div class="slide-sub">Warisan Budaya · Fondasi Teknologi</div>
                    <button class="btn-nav" onclick="goToSlide(2)">🚀 Mulai Petualangan</button>
                </div>
            </div>

            <!-- =========================================================
            SLIDE 2: wel2.jpg
            ========================================================= -->
            <div id="slide2" class="slide">
                <img src="wel2.jpg" class="bg-img" alt="Pelabuhan Etnomatematika">
                <div class="overlay"></div>
                <div class="slide-content">
                    <div class="slide-title" style="font-size: clamp(28px, 5vw, 48px);">
                        SELAMAT DATANG DI<br>
                        <span class="highlight">PELABUHAN ETNOMATEMATIKA</span>
                    </div>
                    <div class="slide-sub">3 Skenario Petualangan Laut Menantimu</div>
                    <button class="btn-nav" onclick="lanjutKeGame()">⛵ Lanjut ke Game</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ===== RESIZE =====
        function resizeGame() {
            const game = document.getElementById('game-container');
            const container = document.getElementById('game-wrapper');
            const w = container.clientWidth;
            const h = container.clientHeight;
            const ratioX = w / 920;
            const ratioY = h / 620;
            let scale = Math.min(ratioX, ratioY);
            if (scale > 1) scale = 1;
            game.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', function() {
            resizeGame();
            document.getElementById('loading-screen').style.display = 'none';
        });

        // ===== SUARA =====
        function playClick() {
            try {
                const audio = document.getElementById('a-click');
                audio.currentTime = 0;
                audio.play().catch(function(e) {});
            } catch (e) {}
        }

        // ===== PINDAH SLIDE =====
        function goToSlide(slideNum) {
            playClick();
            const loader = document.getElementById('loading-screen');
            loader.style.display = 'flex';

            setTimeout(function() {
                document.querySelectorAll('.slide').forEach(function(s) {
                    s.classList.remove('active');
                });
                const target = document.getElementById('slide' + slideNum);
                if (target) target.classList.add('active');
                loader.style.display = 'none';
            }, 500);
        }

        // ===== LANJUT KE GAME =====
        function lanjutKeGame() {
            playClick();
            // Ganti 'index.html' dengan file game utama-mu
            window.location.href = 'index.html';
        }

        // ===== KEYBOARD =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                const active = document.querySelector('.slide.active');
                if (active) {
                    const id = active.id;
                    if (id === 'slide1') goToSlide(2);
                    else if (id === 'slide2') lanjutKeGame();
                }
            }
        });

        console.log('✅ Etnomatematika Nusantara — wel1.jpg & wel2.jpg siap!');
        console.log('📸 Pastikan file wel1.jpg dan wel2.jpg ada di folder yang sama.');
    </script>

</body>
</html>
