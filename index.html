    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a252f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; color: #f5f6fa; }

        #desktopWarning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
            display: none;
        }
        @media screen and (max-width: 768px) {
            #desktopWarning { display: flex !important; }
            .game-container { display: none !important; }
        }
        .warning-box { background: #0984e3; border-radius: 12px; padding: 30px; max-width: 450px; box-shadow: 0 10px 30px rgba(0,168,255,0.4); border: 2px solid #74b9ff; }
        .warning-box h2 { color: #ffeaa7; margin-bottom: 10px; font-size: 24px; }
        .warning-box p { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .btn-oke { background: #ffeaa7; color: #2d3436; font-size: 16px; font-weight: bold; padding: 10px 25px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s; }
        .btn-oke:hover { transform: scale(1.05); background: #fdcb6e; }

        /* 🔥 INTERNET CHECK SCREEN */
        #internetLoading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c3e50 0%, #1a252f 100%);
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #internetLoading .internet-icon { font-size: 80px; animation: pulse-wifi 2s infinite ease-in-out; }
        @keyframes pulse-wifi { 0% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.6; transform: scale(0.9); } }
        #internetLoading h1 { color: #eccc68; font-size: 28px; font-weight: 900; margin-top: 15px; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #internetLoading p { color: #fff; font-size: 18px; font-weight: 600; margin-top: 10px; text-shadow: 0 0 15px #000; }
        .btn-retry-internet { margin-top: 20px; padding: 12px 30px; background: #0984e3; border: none; border-radius: 30px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; display: none; transition: 0.2s; }
        .btn-retry-internet:hover { background: #00a8ff; transform: scale(1.05); }

        .game-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 3 / 2; background-color: #000; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; }
        .audio-panel { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(44, 62, 80, 0.85); border: 2px solid #74b9ff; border-radius: 30px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .audio-toggle { background: transparent; color: #f5f6fa; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .volume-slider { width: 70px; cursor: pointer; accent-color: #00a8ff; }

        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background-color: #1a252f; }
        .slide.active { display: block; }
        .bg-img { width: 100%; height: 100%; object-fit: cover; display: block; background-color: #111; }

        /* 🔥 LOADING SCREEN */
        #loadingScreenRandom { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #2c3e50 0%, #1a252f 100%); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; padding: 20px; }
        .ship-loading-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; }
        .ship-scene { position: relative; width: 100px; height: 80px; animation: floatShip 2s ease-in-out infinite alternate; }
        .hull { position: absolute; bottom: 0; left: 0; width: 100px; height: 25px; background: #5D4037; border-radius: 0 0 40px 10px; }
        .mast { position: absolute; bottom: 20px; left: 45px; width: 4px; height: 65px; background: #3E2723; }
        .sail { position: absolute; border-left: 5px solid transparent; border-right: 5px solid transparent; }
        .sail-left { bottom: 25px; left: 10px; border-bottom: 40px solid #ffffff; border-right: 30px solid transparent; transform: rotate(10deg); box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .sail-right { bottom: 25px; left: 40px; border-bottom: 45px solid #f5f5f5; border-left: 25px solid transparent; transform: rotate(-10deg); box-shadow: -2px 2px 5px rgba(0,0,0,0.1); }
        .waves-container { width: 140px; height: 20px; margin-top: -10px; position: relative; overflow: hidden; }
        .wave { position: absolute; width: 200%; height: 100%; background: repeating-linear-gradient(90deg, rgba(0, 168, 255, 0.6) 0px, rgba(0, 168, 255, 0.6) 15px, rgba(0, 168, 255, 0.1) 15px, rgba(0, 168, 255, 0.1) 30px); border-radius: 50%; animation: waveMove 2.5s linear infinite; }
        @keyframes floatShip { 0% { transform: translateY(0px) rotate(-4deg); } 100% { transform: translateY(-12px) rotate(4deg); } }
        @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        #loadingScreenRandom h2 { color: #eccc68; font-weight: 900; font-size: 22px; text-shadow: 0 0 20px rgba(0,0,0,0.5); margin-top: 20px; letter-spacing: 1px; }

        /* 🔥 LOADING MOBIL */
        #loadingCarTransition { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; color: white; display: none; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 300; text-align: center; overflow: hidden; padding-bottom: 20px; }
        .car-container { position: relative; width: 100%; height: 60px; margin-top: 40px; }
        .car { position: absolute; right: -150px; width: 120px; height: 50px; background: #e67e22; border-radius: 10px 10px 0 0; animation: driveCar 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .car::after { content: ''; position: absolute; top: -25px; left: 15px; width: 90px; height: 30px; background: #f1c40f; border-radius: 15px 15px 0 0; }
        .car::before { content: ''; position: absolute; top: -15px; left: 20px; width: 80px; height: 20px; background: #74b9ff; border-radius: 10px 10px 0 0; }
        .wheel { position: absolute; bottom: -10px; width: 20px; height: 20px; background: #2d3436; border-radius: 50%; border: 3px solid #555; animation: spinWheel 0.5s linear infinite; }
        .wheel-left { left: 15px; } .wheel-right { right: 15px; }
        @keyframes driveCar { 0% { transform: translateX(0); right: -150px; } 100% { transform: translateX(0); right: 50%; } }
        @keyframes spinWheel { 100% { transform: rotate(360deg); } }
        #loadingCarTransition h2 { color: #eccc68; font-weight: 900; font-size: 22px; text-shadow: 0 0 20px rgba(0,0,0,0.5); margin-top: 20px; letter-spacing: 1px; }

        .modal-overlay { position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .name-box { background: rgba(20, 30, 40, 0.95); border: 2px solid #eccc68; border-radius: 15px; padding: 30px; text-align: center; width: 60%; box-shadow: 0 10px 30px rgba(236,204,104,0.3); }
        .name-box h2 { color: #eccc68; margin-bottom: 15px; letter-spacing: 1px; }
        .name-input { width: 90%; padding: 12px; font-size: 16px; font-weight: bold; text-align: center; border-radius: 8px; border: 2px solid #74b9ff; background: #1a252f; color: #fff; margin-bottom: 20px; outline: none; }
        .name-input:focus { border-color: #eccc68; }

        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 12%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 65; pointer-events: auto; }
        .start-text { color: #ffffff; font-size: 3vw; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px rgba(9, 132, 227, 0.9), 0 4px 10px #000; animation: pulse-glow 1.2s infinite; }

        .icon-btn { position: absolute; background: transparent; border: none; cursor: pointer; border-radius: 20%; width: 14%; height: 21%; top: 38%; z-index: 65; transition: 0.2s; pointer-events: auto; }
        .icon-btn:hover { box-shadow: 0 0 20px 8px rgba(0, 168, 255, 0.6); }
        .puzzle-btn { left: 24.5%; } .book-btn { left: 42.5%; } .ship-btn { left: 61%; }

        .tap-zone { position: absolute; background: rgba(0, 168, 255, 0.02); border: 3px dashed #00a8ff; cursor: pointer; z-index: 50; animation: pulse-glow 2s infinite ease-in-out; }
        .tap-zone.ready { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .tap-zone.debug-mode { background: rgba(0, 168, 255, 0.08); border: 3px solid #ffffff; border-radius: 50%; box-shadow: 0 0 30px rgba(0, 168, 255, 1); animation: radar-pulse 1.2s infinite alternate !important; }
        @keyframes radar-pulse { 0% { transform: scale(1); box-shadow: 0 0 10px rgba(0, 168, 255, 0.4); } 100% { transform: scale(1.08); box-shadow: 0 0 40px rgba(0, 168, 255, 1); } }
        @keyframes pulse-glow { 0% { transform: scale(1); text-shadow: 0 0 10px rgba(0, 168, 255, 0.3); } 50% { transform: scale(1.03); text-shadow: 0 0 25px rgba(0, 168, 255, 0.9); } 100% { transform: scale(1); text-shadow: 0 0 10px rgba(0, 168, 255, 0.3); } }

        .pulau-tap { width: 38%; height: 42%; top: 25%; right: 10%; border-radius: 30px; }
        .kapal-tap { width: 60%; height: 26%; bottom: 0; left: 20%; border-radius: 100px 100px 0 0; }
        .kapal-madura-tap { width: 18%; height: 28%; top: 20%; left: 14%; border-radius: 30px; }
        .kakek-tap { width: 20%; height: 35%; top: 25%; right: 25%; border-radius: 20px; display: none; border-color: #eccc68; background: rgba(236, 204, 104, 0.15); border-width: 3px; animation: pulse-glow 2s infinite; }
        .kapal-rusak-tap { width: 25%; height: 25%; bottom: 35%; left: 37%; border-radius: 20px; border: 4px solid rgba(255, 0, 0, 0.8); background: rgba(255, 0, 0, 0.15); animation: pulse-warning 1s infinite ease-in-out; z-index: 60; }
        @keyframes pulse-warning { 0% { border-color: rgba(255, 0, 0, 0.4); background: rgba(255, 0, 0, 0.05); box-shadow: 0 0 10px rgba(255,0,0,0.3); } 50% { border-color: rgba(255, 0, 0, 1); background: rgba(255, 0, 0, 0.3); box-shadow: 0 0 40px rgba(255,0,0,0.8); } 100% { border-color: rgba(255, 0, 0, 0.4); background: rgba(255, 0, 0, 0.05); box-shadow: 0 0 10px rgba(255,0,0,0.3); } }

        /* 🔥 POSISI CRUX YANG SUDAH DIPASKAN DENGAN GAMBAR (Kuadran Kanan Bawah) */
        .star-zone { 
            position: absolute;
            width: 20%; 
            height: 25%; 
            border-radius: 50%; 
            border-color: #f1c40f;
            transform: translate(-50%, -50%); /* Kunci koordinat tepat di TENGAH */
        }
        /* Mengarah tepat ke rasi Crux berdasarkan layout grid bintang */
        .z-crux { top: 68%; left: 65%; }

        .tablet-tap { width: 32%; height: 24%; top: 36%; left: 34%; border-radius: 15px; }

        .menu-panel-wrapper { position: absolute; top: 20%; left: 10%; width: 80%; height: 60%; background: transparent !important; border: none !important; padding: 0; z-index: 60; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: none !important; }
        .menu-panel-title { font-size: 26px; font-weight: 900; color: #fff; border-bottom: 2px dashed #fff; padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 15px #000, 0 0 30px #000; }
        .menu-panel-content { font-size: 18px; font-weight: 700; line-height: 1.6; color: #fff; text-shadow: 0 0 15px #000, 0 0 30px #000; overflow-y: auto; flex-grow: 1; text-align: center; }
        .menu-panel-content ul { list-style: none; padding: 0; margin: 0; }
        .menu-panel-content li { margin-bottom: 15px; }

        .soal-panel-wrapper { position: absolute; top: 5%; left: 4%; width: 92%; height: 75%; z-index: 50; display: flex; flex-direction: row; justify-content: space-between; gap: 10px; background: transparent; padding: 10px; }
        .opsi-card { width: 48%; height: 100%; background: transparent !important; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; border: 3px solid rgba(255,255,255,0.2); justify-content: center; align-items: center; }
        .opsi-card:hover { transform: scale(1.02); border-color: #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.5); }
        .opsi-card-a { border-color: rgba(230, 126, 34, 0.8); }
        .opsi-card-b { border-color: rgba(52, 152, 219, 0.8); }
        .opsi-header { font-size: 22px; font-weight: 900; color: #fff; text-align: center; padding-bottom: 10px; border-bottom: 2px dashed rgba(255,255,255,0.3); margin-bottom: 15px; text-shadow: 0 0 20px #000, 0 0 10px #000; }
        .opsi-header-a { color: #e67e22; }
        .opsi-header-b { color: #3498db; }
