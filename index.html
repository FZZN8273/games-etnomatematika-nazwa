<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Etnomatematika</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2c3e50; /* Warna latar luar game */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* Ukuran maksimal game di layar PC */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .slide {
            position: relative; /* Agar elemen di dalamnya bisa absolute terhadap gambar */
            display: none; 
            width: 100%;
        }

        .slide.active {
            display: block; 
        }

        .bg-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ============================
           STYLING SLIDE 1 (START)
        ============================ */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12%; /* Pas dengan area biru di wel1.jpg */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .start-text {
            color: #ffffff;
            font-size: 3.5vw; /* Ukuran font responsif mengikuti layar */
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease-in-out;
        }

        /* Efek membesar saat kursor diarahkan */
        .bottom-bar:hover .start-text {
            transform: scale(1.1);
            color: #f1c40f; 
        }

        /* ============================
           STYLING SLIDE 2 (MENU IKON)
        ============================ */
        .icon-btn {
            position: absolute;
            background: transparent; /* Tombol tidak terlihat */
            border: none;
            cursor: pointer;
            border-radius: 20%;
            width: 15%; 
            height: 22%;
            top: 40%; /* Tinggi posisi dari atas gambar */
            transition: box-shadow 0.2s ease;
        }

        /* Efek nyala saat kursor diarahkan ke ikon */
        .icon-btn:hover {
            box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.7);
        }

        /* Koordinat presisi masing-masing ikon */
        .puzzle-btn {
            left: 24.5%; 
        }

        .book-btn {
            left: 42.5%; 
        }

        .ship-btn {
            left: 60.5%;
        }

        /* Batasi ukuran font maksimal di layar besar */
        @media (min-width: 900px) {
            .start-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <audio id="clickSound" src="click.mp3"></audio>

    <div class="game-container">
        
        <div id="slide1" class="slide active">
            <img src="wel1.jpg" alt="Selamat Datang" class="bg-img">
            
            <div class="bottom-bar" onclick="goToSlide('slide2')">
                <span class="start-text">START GAME!!!</span>
            </div>
        </div>

        <div id="slide2" class="slide">
            <img src="wel2.jpg" alt="Pelabuhan Etnomatematika" class="bg-img">
            
            <button class="icon-btn puzzle-btn" onclick="pilihMenu('Cara Main')"></button>
            <button class="icon-btn book-btn" onclick="pilihMenu('Rules')"></button>
            <button class="icon-btn ship-btn" onclick="pilihMenu('Mulai Petualangan')"></button>
        </div>

    </div>

    <script>
        // Ambil elemen audio
        const clickSound = document.getElementById('clickSound');

        // Fungsi khusus untuk memutar suara
        function playClickSound() {
            clickSound.currentTime = 0; // Reset ke awal supaya bisa diklik cepat berulang kali
            clickSound.play();
        }

        // Fungsi pindah ke Slide 2
        function goToSlide(slideId) {
            playClickSound(); // Mainkan suara
            
            // Hapus class 'active' dari semua slide
            document.querySelectorAll('.slide').forEach(slide => {
                slide.classList.remove('active');
            });

            // Tambahkan class 'active' ke slide yang dituju
            document.getElementById(slideId).classList.add('active');
        }

        // Fungsi sementara saat ikon slide 2 diklik
        function pilihMenu(menuName) {
            playClickSound(); // Mainkan suara
            
            // Nanti alert ini bisa diganti dengan fungsi pindah ke slide 3, 4, dst.
            setTimeout(() => {
                alert("Kamu memilih menu: " + menuName);
            }, 200); // Delay sedikit agar suara klik terdengar sebelum alert muncul
        }
    </script>

</body>
</html>
