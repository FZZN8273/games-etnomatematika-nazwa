<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Etnomatematika - Sistem Ekspedisi Dinamis</title>
    
    <style>
        /* ============================
           RESET & FONT JURNAL PETUALANGAN
        ============================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #1a252f;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #f5f6fa;
        }

        /* ============================
           WARNING LAYAR DESKTOP 
        ============================ */
        #desktopWarning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .warning-box {
            background: #0984e3; border-radius: 12px; padding: 30px; max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,168,255,0.4); border: 2px solid #74b9ff;
        }
        .warning-box h2 { color: #ffeaa7; margin-bottom: 10px; font-size: 24px; }
        .warning-box p { font-size: 16px; line-height: 1.5; margin-bottom: 20px; }
        .btn-oke {
            background: #ffeaa7; color: #2d3436; font-size: 16px; font-weight: bold;
            padding: 10px 25px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;
        }
        .btn-oke:hover { transform: scale(1.05); background: #fdcb6e; }

        /* ============================
           LOADING SYSTEM
        ============================ */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2c3e50; color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; display: none;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #00a8ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ============================
           GAME FRAME CANVAS (3:2 RATIO MURNI)
        ============================ */
        .game-container {
            position: relative; width: 100%; max-width: 900px; aspect-ratio: 3 / 2; 
            background-color: #000; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none;
        }
        
        /* REGULATOR VOLUME AUDIO PANEL ± */
        .audio-panel {
            position: absolute; top: 15px; right: 15px; z-index: 70;
            background: rgba(44, 62, 80, 0.85); border: 2px solid #74b9ff;
            border-radius: 30px; padding: 5px 15px; display: flex;
            align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .audio-toggle { background: transparent; color: #f5f6fa; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .volume-slider { width: 70px; cursor: pointer; accent-color: #00a8ff; }

        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .slide.active { display: block; }
        
        /* TIMING ZOOM GERAKAN KILAT INSTAN */
        .bg-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease-out; transform-origin: 50% 50%; display: block; }
        .batu-zoomed .bg-img { transform: scale(1.6) translateY(-5%); }

        /* ============================
           MENU UTAMA BERANDA
        ============================ */
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 12%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .start-text { color: #ffffff; font-size: 3vw; font-weight: 900; letter-spacing: 2px; text-shadow: 0px 4px 10px #0984e3; animation: pulse-glow 1.5s infinite; }
        .icon-btn { position: absolute; background: transparent; border: none; cursor: pointer; border-radius: 20%; width: 14%; height: 21%; top: 38%; z-index: 10; transition: 0.2s; }
        .icon-btn:hover { box-shadow: 0 0 20px 8px rgba(0, 168, 255, 0.6); }
        .puzzle-btn { left: 24.5%; } .book-btn { left: 42.5%; } .ship-btn { left: 61%; }

        /* ============================
           ZONA TAP INTERAKTIF RESPONSIF INSTAN
        ============================ */
        .tap-zone { position: absolute; background: rgba(0, 168, 255, 0.02); border: 2px dashed #00a8ff; cursor: pointer; z-index: 30; animation: pulse-glow 2s infinite ease-in-out; }
        .tap-zone.ready { border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        .tap-zone:hover { background: rgba(0, 168, 255, 0.15); }
        
        /* Tap Skenario 1 */
        .pulau-tap { width: 38%; height: 42%; top: 25%; right: 10%; border-radius: 30px; }
        .kapal-tap { width: 60%; height: 26%; bottom: 0; left: 20%; border-radius: 100px 100px 0 0; }
        .batu-tap { width: 36%; height: 44%; top: 32%; left: 32%; border-radius: 50% 50% 35% 35%; }
        
        /* Tap Peta Samudra & Blijãh */
        .kapal-laut-tap { width: 25%; height: 35%; top: 40%; left: 40%; border-radius: 40px; }
        .blijah-tap { width: 40%; height: 50%; top: 25%; left: 30%; border-radius: 20px; }

        @keyframes pulse-glow { 0% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 168, 255, 0.3); } 50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(0, 168, 255, 0.6); } 100% { transform: scale(1); box-shadow: 0 0 5px rgba(0, 168, 255, 0.3); } }

        /* ============================
           EFEK KEDIP HITAM INSTAN KILAT (0.20
